version: "3.9"
name: iptv-restream
services:
  -frontend:
#    build:
#      context: ./frontend
#      dockerfile: Dockerfile
    environment:
        # Set this to the server ip/domain, if your backend is deployed on a different server
        #VITE_BACKEND_URL: http://123.123.123.123:5000
       VITE_STREAM_DELAY: 18
       VITE_STREAM_PROXY_DELAY: 30
        # Optional settings for synchronization
        #VITE_SYNCHRONIZATION_TOLERANCE: 0.8
        #VITE_SYNCHRONIZATION_MAX_DEVIATION: 4
        #VITE_SYNCHRONIZATION_ADJUSTMENT: 0.06
        #VITE_SYNCHRONIZATION_MAX_ADJUSTMENT: 0.16
    image: registry.ovcn.ddnsfree.com/iptv-restream-frontend:latest
    container_name: iptv_restream_frontend
    networks:
      - app-network

  -backend:
#    build:
#      context: ./backend
#      dockerfile: Dockerfile
    image: registry.ovcn.ddnsfree.com/iptv-restream-backend:latest
    container_name: iptv_restream_backend
    volumes:
      - streams_data:/streams
      - channels:/channels
    environment:
      STORAGE_PATH: /streams/
      # If you have problems with the playlist, set the backend url manually here
      #BACKEND_URL: http://localhost:5000
    networks:
      - app-network

  # Nginx Reverse Proxy
  -nginx:
    image: nginx:alpine
    container_name: iptv_restream_nginx
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf
      - streams_data:/streams
    ports:
      - "8070:80"
    networks:
      - app-network

volumes:
  streams_data:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
  channels:

# Internal docker network
networks:
  app-network:
    driver: bridge
